apiVersion: v1
kind: Secret
metadata:
  name: recruitment-config
  namespace: chandana-ns
data:
  MONGO_URI: "mongodb://rootuser:rootpassword@mongo-service:27017/hr_system?authSource=admin"
  MONGO_INITDB_ROOT_USERNAME: "rootuser"
  MONGO_INITDB_ROOT_PASSWORD: "rootpassword"



---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: chandana-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      apps: rec-app
  template:
    metadata:
      labels:
        apps: rec-app
    spec:
      containers:
        - name: mongo-container
          image: mongo
          ports:
          - containerPort: 27017
          envFrom:
            - configMapRef:
                name: recruitment-config


---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  namespace: chandana-ns
spec:
  selector:
    apps: rec-app
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP


