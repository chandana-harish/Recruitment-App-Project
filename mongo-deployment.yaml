apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: chandana-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      apps: rec-apps
  template:
    metadata:
      labels:
        apps: rec-apps
    spec:
      containers:
        - name: mongo-container
          image: mongo
          ports:
          - containerPort: 27017
          envFrom:
            - configMapRef:
                name: recruitment-configmap


---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  namespace: chandana-ns
spec:
  selector:
    app: rec-app
  ports:
  - port: 3004
    targetPort: 27017
  type: NodePort


---
apiVersion: v1
kind: ConfigMap
metadata:
  name: recruitment-configmap
  namespace: chandana-ns
data:
  MONGO_URI: "mongodb://rootuser:root123@mongodb-service:27017/hr_system?authSource=admin"
  MONGO_INITDB_ROOT_USERNAME: "rootuser"
  MONGO_INITDB_ROOT_PASSWORD: "root123"